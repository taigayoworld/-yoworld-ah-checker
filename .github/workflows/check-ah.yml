name: Check AH for Buy List Items

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-ah:
    runs-on: ubuntu-latest
    steps:
      - name: Check AH for Buy List Items
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          node << 'EOF'
          const https = require('https');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_ANON_KEY = process.env.SUPABASE_ANON_KEY;
          const DISCORD_WEBHOOK_URL = process.env.DISCORD_WEBHOOK_URL;
          const AH_API = 'https://yoworld.net/api/v1/yoworld/auction/search';

          function makeRequest(url, method = 'GET', body = null, headers = {}) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(url);
              const isHttps = urlObj.protocol === 'https:';
              const client = isHttps ? https : require('http');

              const options = {
                hostname: urlObj.hostname,
                path: urlObj.pathname + urlObj.search,
                method: method,
                headers: {
                  'Content-Type': 'application/json',
                  ...headers
                }
              };

              if (body) {
                options.headers['Content-Length'] = Buffer.byteLength(body);
              }

              const req = client.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    resolve({
                      status: res.statusCode,
                      body: data ? JSON.parse(data) : null
                    });
                  } catch (e) {
                    resolve({
                      status: res.statusCode,
                      body: data
                    });
                  }
                });
              });

              req.on('error', reject);
              if (body) req.write(body);
              req.end();
            });
          }

          async function getBuyListFromSupabase() {
            console.log('Fetching buy list from Supabase...');
            const url = `${SUPABASE_URL}/rest/v1/buy_list`;
            const res = await makeRequest(url, 'GET', null, {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            });

            if (res.status !== 200) {
              throw new Error(`Failed to fetch buy list: ${res.status}`);
            }

            return Array.isArray(res.body) ? res.body : [];
          }

          async function getNotifiedItems() {
            console.log('Fetching notified items...');
            const url = `${SUPABASE_URL}/rest/v1/ah_checker_notified`;
            const res = await makeRequest(url, 'GET', null, {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
            });

            if (res.status !== 200) {
              console.warn(`Failed to fetch notified items: ${res.status}`);
              return [];
            }

            return Array.isArray(res.body) ? res.body : [];
          }

          async function addNotifiedItem(itemId, itemName) {
            try {
              const res = await makeRequest(`${SUPABASE_URL}/rest/v1/ah_checker_notified`, 'POST', 
                JSON.stringify({
                  item_id: String(itemId),
                  item_name: itemName
                }),
                {
                  'apikey': SUPABASE_ANON_KEY,
                  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                  'Prefer': 'resolution=merge-duplicates,return=minimal'
                }
              );
              if (res.status >= 400) {
                console.warn(`Failed to add notified item: ${res.status}`);
              }
            } catch (e) {
              console.warn(`Error adding notified item: ${e.message}`);
            }
          }

          async function searchAH(itemName) {
            const body = JSON.stringify({
              active_in_store: false,
              bid_count: false,
              sort: 0,
              start: 0,
              item_name: itemName
            });

            const res = await makeRequest(AH_API, 'PUT', body, {
              'X-Requested-With': 'XMLHttpRequest'
            });

            if (res.status !== 200) {
              console.warn(`AH search failed for "${itemName}": ${res.status}`);
              return [];
            }

            return res.body?.results || [];
          }

          function formatCoinsShort(n) {
            if (n === null || n === undefined) return "—";
            if (n >= 1_000_000) {
              const v = n / 1_000_000;
              return (Number.isInteger(v) ? v : v.toFixed(1)) + "m";
            }
            if (n >= 1000) {
              const v = n / 1000;
              return (Number.isInteger(v) ? v : v.toFixed(1)) + "k";
            }
            return String(n);
          }

          async function sendDiscordNotification(items) {
            if (!DISCORD_WEBHOOK_URL || items.length === 0) {
              return;
            }

            for (const item of items) {
              const isAboveAverage = item.priceChange.includes('higher');
              const embedColor = isAboveAverage ? 15158332 : 3066993;
              const priceIcon = item.isCash ? '💸' : '💰';
              
              const idStr = String(item.itemId).padStart(5, '0');
              const thumbnailUrl = `https://yw-web.yoworld.com/cdn/items/${idStr.slice(0,2)}/${idStr.slice(2,4)}/${idStr}/${idStr}.png`;
              
              const embed = {
                title: `✨ ${item.name}`,
                color: embedColor,
                description: `${priceIcon} ${item.price} ${item.priceChange}`,
                thumbnail: {
                  url: thumbnailUrl
                },
                fields: []
              };

              const body = JSON.stringify({ embeds: [embed] });
              const res = await makeRequest(DISCORD_WEBHOOK_URL, 'POST', body);

              if (res.status !== 204 && res.status !== 200) {
                console.warn(`Failed to send Discord notification: ${res.status}`);
              } else {
                console.log(`Discord notification sent for ${item.name}`);
              }
            }
          }

          async function main() {
            try {
              const buyList = await getBuyListFromSupabase();
              console.log(`Found ${buyList.length} items in buy list`);

              if (buyList.length === 0) {
                console.log('No items in buy list');
                return;
              }

              const notifiedItems = await getNotifiedItems();
              const notifiedIds = new Set(notifiedItems.map(n => String(n.item_id)));
              const items = [];

              for (const item of buyList) {
                console.log(`Checking: ${item.item_name}`);

                const results = await searchAH(item.item_name);
                const matches = results.filter(r => String(r.item_id) === String(item.item_id));

                if (matches.length > 0 && !notifiedIds.has(String(item.item_id))) {
                  const listing = matches[0];
                  console.log('Listing object:', JSON.stringify(listing, null, 2));
                  
                  const avg = listing.currency === 1 ? listing.avg_price : listing.avg_price_cash;
                  const price = listing.currency === 1 
                    ? `${formatCoinsShort(listing.cur_bid_amount)} coins` 
                    : `${formatCoinsShort(listing.cur_bid_amount)} cash`;
                  
                  const pct = Math.round(Math.abs(listing.cur_bid_amount - avg) / avg * 100);
                  const priceChange = listing.cur_bid_amount <= avg ? `📉 ${pct}% lower` : `📈 ${pct}% higher`;
                  
                  items.push({
                    name: item.item_name,
                    price: price,
                    priceChange: priceChange,
                    isCash: listing.currency !== 1,
                    itemId: item.item_id
                  });
                  console.log(`NEW: ${item.item_name}`);
                  
                  await addNotifiedItem(item.item_id, item.item_name);
                } else if (matches.length > 0) {
                  console.log(`Already notified: ${item.item_name}`);
                } else {
                  console.log(`Not listed: ${item.item_name}`);
                }

                await new Promise(resolve => setTimeout(resolve, 1000));
              }

              if (items.length > 0) {
                console.log(`Sending ${items.length} notification(s) to Discord`);
                await sendDiscordNotification(items);
              } else {
                console.log('No new items to notify');
              }
            } catch (error) {
              console.error('Error:', error.message);
              process.exit(1);
            }
          }

          main();
          EOF
